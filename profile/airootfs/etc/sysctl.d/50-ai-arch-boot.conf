# AI Arch Linux -- boot-time sysctl defaults.
#
# These are generic tunings that help both old HW (Pentium 4 / 1 GB) and
# modern HW (AVX-512 / 32 GB + NVMe).  Hardware-specific values (CPU
# governor, I/O scheduler, swappiness, dirty ratios, socket-buffer caps)
# are applied later by ai-hw-detect.service -> /usr/lib/ai-arch/sysctl-tune.sh.
#
# File organisation:
#   50-ai-arch-boot.conf  (this file) -- universal VM + FS defaults
#   60-network.conf                   -- TCP/IP stack tuning (BBR, fq, fastopen)
#   70-security.conf                  -- kernel hardening (kptr, dmesg, rp_filter)
# HW-tiered sysctls are written at runtime to /run/sysctl.d/90-ai-arch-hw.conf
# so `sysctl --system` picks them up on reload and they never override static
# values that belong in vendor packages.

# --- Virtual memory (safe middle-ground; hw-detect overrides for OLD/NEW) ---
# These values trade latency for throughput in a way that works for both
# tiers.  sysctl-tune.sh narrows them for SSD (5/2) or HDD (30/10).
vm.dirty_ratio = 20
vm.dirty_background_ratio = 5
# dirty_expire: how old a dirty page can be before pdflush must write it.
# 30 s is a reasonable default; lower values cause more wakeups.
vm.dirty_expire_centisecs = 3000
# dirty_writeback: how often pdflush wakes up.  Keeping this long avoids
# constant CPU wakeups on idle laptops (power saving) while still meeting
# the expire deadline above.
vm.dirty_writeback_centisecs = 1500
# max_map_count: bigger helps modern games (Unity, Unreal, DXVK shader
# caches) AND lets low-RAM systems map many tiny squashfs files efficiently.
vm.max_map_count = 1048576
# OOM killer: prefer to kill the largest offender rather than panic
vm.oom_kill_allocating_task = 0
vm.panic_on_oom = 0
# Older games / Wine / anti-cheats expect a generous overcommit budget.
vm.overcommit_memory = 1
# min_free_kbytes: kernel reserve for emergency allocations.  128 MiB is a
# safe floor for systems >= 4 GiB; sysctl-tune.sh scales down for low-RAM.
vm.min_free_kbytes = 131072

# --- Filesystem --------------------------------------------------------------
# Inotify limits: default 8192 chokes VSCode, systemd-networkd, IDEs.
fs.inotify.max_user_watches = 524288
# Default 128 chokes VSCode + Docker + multiple file watchers simultaneously.
fs.inotify.max_user_instances = 1024
# Max open files (games, containers, PE loader with 37+ DLLs eat these fast)
fs.file-max = 2097152
# Per-process file-descriptor ceiling.  Must be >= file-max for the rlimit
# to actually apply; 2^20 lets any single process open a million handles.
fs.nr_open = 1048576
# Allow users to create aio contexts (some DBs and DXVK use io_submit).
fs.aio-max-nr = 1048576
# Allow protected regular/fifo/hardlink creation in /tmp (security + compat).
fs.protected_regular = 2
fs.protected_fifos = 2
fs.protected_hardlinks = 1
fs.protected_symlinks = 1
# suid_dumpable=0 blocks core dumps from setuid binaries (leak mitigation).
fs.suid_dumpable = 0

# --- Kernel scheduling / IPC ------------------------------------------------
# sched_autogroup: isolates desktop responsiveness from bg builds.  Default 1
# on modern kernels; we set it explicitly so it stays on if a vendor flips it.
kernel.sched_autogroup_enabled = 1
# PID space: 4194304 (32-bit max) -- helpful for many-process workloads like
# `make -j256` or containers.  Costs negligible memory until actually used.
kernel.pid_max = 4194304
# Full address-space layout randomisation (already default, set explicitly).
kernel.randomize_va_space = 2
# SysRq: 1 lets Alt-SysRq-REISUB recover from freezes.  Invaluable on old HW
# where X can wedge; trivially restricted by console access anyway.
kernel.sysrq = 1
# POSIX SHM limits: bump from 32 MiB default to 8 GiB for modern workloads
# (PostgreSQL, Chrome shared tabs, DXVK).  sysctl-tune.sh backs this off on
# low-RAM systems so small boxes don't over-commit.
kernel.shmmax = 8589934592
kernel.shmall = 2097152
# msg*: System V IPC limits, used by some games and the X server shm path.
kernel.msgmnb = 65536
kernel.msgmax = 65536
