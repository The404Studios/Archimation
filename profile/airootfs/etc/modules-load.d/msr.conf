# Load the Intel/AMD MSR (Model-Specific Register) driver at boot so the
# AI Control Daemon can read IA32_THERM_STATUS (0x19C),
# IA32_PACKAGE_THERM_STATUS (0x1B1) and IA32_APERF/MPERF (0xE7/0xE8) for
# precise per-core temperature and effective-frequency telemetry.
#
# Gracefully absent on kernels built without CONFIG_X86_MSR=m, on non-x86
# architectures, and in QEMU without -cpu host — in those cases the daemon
# falls back to /sys/class/thermal zones automatically.
msr
