[greeter]
# Theme & icons
theme-name = Adwaita-dark
icon-theme-name = Papirus-Dark
cursor-theme-name = Adwaita
cursor-theme-size = 24

# Typography
font-name = Noto Sans 11
xft-antialias = true
# DPI is auto-detected by /etc/lightdm/display-setup.sh (via xrdb).
# This value is used only as a fallback when auto-detection fails.
xft-dpi = 96
xft-hintstyle = hintslight
xft-rgba = rgb

# Background — solid dark color matching Plymouth's Tokyo Night palette (#1a1b26).
# This ensures that if the greeter briefly flashes during autologin, it shows
# the same dark background as Plymouth for a seamless visual transition.
# The wallpaper image is NOT used here because loading an SVG causes a visible
# flash of ArchWindows branding that looks like a second boot screen.
background = #1a1b26
user-background = false
hide-user-image = true
default-user-image = #

# Login window position (centered)
position = 50%,center 50%,center

# 24-hour clock (change to %I:%M %p for 12-hour)
clock-format = %H:%M

# Top panel: hostname, keyboard layout, a11y, clock, session picker, power menu
panel-position = top
indicators = ~host;~spacer;~layout;~a11y;~clock;~spacer;~session;~power

# User avatar — hidden during autologin (set above with hide-user-image)
# default-user-image = /usr/share/pixmaps/archlinux-logo.svg

# Screen lock / screensaver
screensaver-timeout = 300

# Keyboard — show layout switcher if multiple layouts configured
keyboard = onboard
reader = orca

# Misc
a11y-states = +keyboard;+reader
active-monitor = #cursor
