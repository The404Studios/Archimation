#
# pacman.conf - AI Arch Linux ISO build configuration
#
# This is the pacman configuration used during ISO creation.
# It includes the standard Arch repositories plus a custom
# local repository for project-specific packages.
#

[options]
HoldPkg     = pacman glibc
Architecture = x86_64
CheckSpace
SigLevel    = Never
LocalFileSigLevel = Optional

# Misc options
ParallelDownloads = 5

# --- Standard Arch Linux Repositories ---

[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

[multilib]
Include = /etc/pacman.d/mirrorlist

# --- Custom Local Repository ---
# Contains pe-loader, ai-control-daemon, ai-firewall,
# windows-services, and other project packages.
# The Server path is rewritten by scripts/build-iso.sh at build time.

[pe-compat]
SigLevel = Optional TrustAll
Server = file:///mnt/c/Users/wilde/Downloads/arch-linux-with-full-ai-control/repo/x86_64
