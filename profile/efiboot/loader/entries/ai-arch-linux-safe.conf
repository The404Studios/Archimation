title   AI Arch Linux (x86_64, UEFI) - Safe Mode
linux   /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux
initrd  /%INSTALL_DIR%/boot/intel-ucode.img
initrd  /%INSTALL_DIR%/boot/amd-ucode.img
initrd  /%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
options archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% rootdelay=15 nomodeset cow_spacesize=30G amd_pstate=active amd_iommu=on iommu=pt transparent_hugepages=always loglevel=3 plymouth.enable=0
