# AI Arch Linux — power button behavior
#
# Rationale:
#  - Short tap of power button => graceful poweroff (default systemd behavior,
#    pinned here so a future distro change cannot silently flip it).
#  - Long-press (>5s) => reboot. Gives a user who wants to force-recycle the
#    box an explicit path that is distinct from a brief accidental tap.
#  - PowerKeyIgnoreInhibited=no: if an app (Plymouth, a game, a session
#    inhibitor) asks us to block shutdown, we still honor the button. The user
#    pressing the physical button is always authoritative.
#  - HoldoffTimeoutSec=30: after boot the kernel ignores the power button
#    for 30 s. This prevents the race the user hit where pressing the button
#    mid-Plymouth triggers a teardown before userspace has even settled, which
#    is what surfaces the raw kernel-init text between the splash frames.
#    After 30 s the button is fully live and behaves as documented above.
#  - InhibitDelayMaxSec=5: cap the time a well-behaved inhibitor can delay
#    shutdown; keeps the UX snappy.
#  - IdleAction=ignore: we don't want logind forcing suspend on an AI box
#    that is presumed to be actively doing work.

[Login]
HandlePowerKey=poweroff
HandlePowerKeyLongPress=reboot
HandleRebootKey=reboot
HandleSuspendKey=suspend
HandleHibernateKey=hibernate
HandleLidSwitch=suspend
HandleLidSwitchExternalPower=ignore
HandleLidSwitchDocked=ignore

PowerKeyIgnoreInhibited=no
SuspendKeyIgnoreInhibited=no
HibernateKeyIgnoreInhibited=no
LidSwitchIgnoreInhibited=no

HoldoffTimeoutSec=30s
InhibitDelayMaxSec=5s
UserStopDelaySec=10s

IdleAction=ignore
IdleActionSec=30min
