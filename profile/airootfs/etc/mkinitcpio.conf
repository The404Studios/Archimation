# mkinitcpio.conf for AI Arch Linux Live ISO
# Must include archiso hooks for live ISO booting
#
# MODULES: We force-include the GPU KMS drivers (i915 / amdgpu) so the splash
# comes up immediately in Plymouth's DRM renderer instead of falling back to
# VESA/efifb for several seconds while udev auto-loads them from the late
# modprobe pass.  NVIDIA is *intentionally* omitted: the proprietary stack is
# not shipped in the live ISO (see packages.x86_64 -- nvidia-open is install-
# time only) and forcing nouveau here hangs GT218/NVS 3100M.
MODULES=(i915 amdgpu radeon)
BINARIES=()
FILES=()
# HOOK order (runs left -> right):
#   base         -- core mkinitcpio scaffolding
#   udev         -- /dev + modalias-driven autoload (brings in nouveau for
#                   supported NVIDIAs, nvme for modern laptops, xhci_hcd for
#                   USB keyboard/mouse, and every SCSI/SATA/virtio storage)
#   modconf      -- /etc/modprobe.d/ blacklists picked up BEFORE modules load
#                   (moved BEFORE autodetect-era hooks so our blacklist-intel-
#                    ips.conf and similar quirks fire first)
#   keyboard     -- early keymap + keyboard drivers (must be before plymouth
#                   so password entry on encrypted disks works)
#   keymap       -- keyboard layout (read from /etc/vconsole.conf)
#   plymouth     -- boot splash (needs DRM modules + keyboard by now)
#   ai-persist   -- our graceful fallback when the persistence label is absent
#   archiso      -- squashfs/overlay mount core
#   archiso_loop_mnt -- loopback ISO mount (needed for `img_loop=`)
#   block        -- lvm/mdadm/dmraid scaffolding for installer targets
#   filesystems  -- mount the root fs
#   fsck         -- fsck the root fs (cheap and fast)
HOOKS=(base udev modconf keyboard keymap plymouth ai-persist archiso archiso_loop_mnt block filesystems fsck)

# Compression: zstd is roughly 5x faster to decompress than the archiso
# default (zstd -3 or xz) and within ~3% on ratio at level 19.  Critically,
# zstd handles multi-threaded decompress cleanly on modern CPUs while still
# being dramatically cheaper on old single-core hardware.
COMPRESSION="zstd"
COMPRESSION_OPTIONS=(-19 -T0)
