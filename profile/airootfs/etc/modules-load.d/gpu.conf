# Load GPU kernel modules at boot so Xorg/LightDM can start.
# nouveau works on ALL NVIDIA GPUs (Tesla through Blackwell).
# nvidia-open only supports Maxwell+ (SM 5.0+) and may fail on older GPUs.
# Load nouveau first; if nvidia-open is built via DKMS and loads, it
# takes over the GPU from nouveau automatically.
nouveau
amdgpu
i915
