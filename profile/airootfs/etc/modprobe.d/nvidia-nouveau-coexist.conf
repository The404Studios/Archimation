# Override nvidia-utils nouveau blacklist for the live ISO.
# nvidia-open-dkms only supports Maxwell+ (SM 5.0+) GPUs.
# Older NVIDIA GPUs (Fermi, Kepler, Tesla) need nouveau.
# Let both drivers be available — the kernel picks the right one.
#
# On installed systems with modern NVIDIA, the user can re-blacklist
# nouveau via: echo "blacklist nouveau" > /etc/modprobe.d/blacklist-nouveau.conf
install nouveau /sbin/modprobe --ignore-install nouveau
