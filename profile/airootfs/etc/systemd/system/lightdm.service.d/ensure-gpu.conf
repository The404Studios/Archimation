[Unit]
After=systemd-modules-load.service
Wants=systemd-modules-load.service

[Service]
# If /dev/dri/card0 doesn't exist, try loading GPU modules.
# nouveau works on ALL NVIDIA GPUs. i915 covers Intel. amdgpu covers AMD.
# Modesetting X driver is the final fallback (10-modesetting-fallback.conf).
ExecStartPre=-/bin/sh -c 'if [ ! -e /dev/dri/card0 ]; then modprobe nouveau 2>/dev/null; modprobe i915 2>/dev/null; modprobe amdgpu 2>/dev/null; sleep 1; fi'
