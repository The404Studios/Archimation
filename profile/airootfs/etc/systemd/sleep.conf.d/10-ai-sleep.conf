# AI Arch Linux — sleep / suspend policy
#
# Prefer s2idle (modern laptops, no firmware tricks) then deep (server-class
# boxes that support S3). Hibernate uses the swapfile/zram config. Keep the
# allow-list explicit so no accidental behaviour regressions sneak in.

[Sleep]
AllowSuspend=yes
AllowHibernation=yes
AllowSuspendThenHibernate=yes
AllowHybridSleep=yes

SuspendMode=
SuspendState=mem standby freeze

HibernateMode=platform shutdown
HibernateState=disk

HybridSleepMode=suspend platform shutdown
HybridSleepState=disk

HibernateDelaySec=120min
