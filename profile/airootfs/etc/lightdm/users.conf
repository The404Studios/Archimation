#
# LightDM user filtering.
#
# If this file is missing, LightDM falls back to compiled-in defaults --
# usually fine, but we pin values explicitly so a dist-upgrade changing
# the defaults can't suddenly hide the 'arch' autologin user and make
# the greeter show an empty list (which some versions treat as fatal).
#
[UserList]
# UIDs < minimum-uid never appear in the greeter / are never valid for
# autologin.  Arch creates 'arch' as UID 1000 which clears this bar.
minimum-uid=1000
# Exclude daemons and the obvious system accounts.  'arch' is not in
# this list so autologin works.
hidden-users=nobody nobody4 noaccess lightdm polkitd systemd-coredump systemd-network systemd-resolve systemd-timesync dbus sshd avahi named rpc rtkit uuidd http ftp mail
hidden-shells=/bin/false /usr/bin/nologin /sbin/nologin /usr/sbin/nologin
