# 10-quirks.conf -- driver-neutral boot safety net.
#
# The explicit Driver sections in 20-gpu-tearfree.conf,
# 20-nouveau-legacy.conf, and the NVIDIA OutputClass shipped by
# ai-desktop-config all use MatchDriver=... which is a NO-OP if the
# kernel did not load that driver (e.g. QEMU booted with virtio-gpu
# or bochsdrm instead of nvidia_drm).
#
# Without any match, Xorg still needs to pick *some* GPU.  On modern
# xorg-server this Just Works via auto-detection, but the server
# will REFUSE to start if it finds no DRI device at all.  That is
# exactly what happens in headless QEMU when the guest has no
# DRM-capable GPU visible (bios=seabios, vga=cirrus, no -vga
# virtio).
#
# The ServerFlags below let the server fall back gracefully instead
# of silently exiting -- which was the symptom LightDM was showing
# (greeter never comes up, lightdm.log says "X server died").

Section "ServerFlags"
    # AutoAddGPU=on is default but some distros flip it via a /usr
    # drop-in; pin it here.
    Option "AutoAddGPU"         "on"
    # Allow Xorg to start even if no output is currently connected.
    # Critical for QEMU cold boots where the display has not yet
    # negotiated an EDID mode.
    Option "AllowEmptyInput"    "off"
    Option "DontZap"            "off"
    # Keep the current VT; logind hands us one, do not fight for
    # tty7.  Conflicts with getty@tty7 if we guess wrong.
    Option "DontVTSwitch"       "off"
EndSection

# Fallback Device section.  Loaded only when no OutputClass matches
# (i.e. the real GPU driver is nouveau/amdgpu/i915 -- and the
# matching 20-*.conf wins -- OR none match and we fall into this
# Screen/Device pair for generic modesetting).
Section "Device"
    Identifier      "fallback-modesetting"
    Driver          "modesetting"
    Option          "AccelMethod"   "glamor"
    # DRI 3 is required for Vulkan-on-X11; modesetting supports it
    # for any DRM device (virtio-gpu, bochs, qxl, nvidia-drm when
    # nvidia driver is absent).
    Option          "DRI"           "3"
EndSection
