# /tmp size cap -- prevent tmpfs from eating all RAM on low-memory boxes.
#
# Default systemd-tmpfs for /tmp is 50% of total RAM with no hard cap.  On
# a 1 GB Pentium 4 that is 512 MB consumed for /tmp alone -- catastrophic.
#
# Size=40% caps growth at 40% of RAM, which is the pre-v2.30 systemd default.
# The nr_inodes cap prevents pathological many-small-files exhaustion.

[Mount]
Options=mode=1777,strictatime,nosuid,nodev,size=40%%,nr_inodes=1m
