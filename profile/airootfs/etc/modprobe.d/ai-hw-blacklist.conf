# Hardware compatibility blacklists for AI Arch Linux.
#
# These modules are known to cause problems on specific hardware.  Blacklisting
# here runs BEFORE the initramfs 'modconf' hook, so udev won't auto-load them
# even when a matching PCI device is present.

# --- pcspkr: beep on tty bell ---
# Modern laptops and VMs either lack a PC speaker or route it through HDA
# audio. Loading the module triggers an audible "beep" on every error and
# breaks autocomplete on terminals that ring the bell. Arch's default.
blacklist pcspkr
blacklist snd_pcsp

# --- iTCO_wdt: Intel watchdog ---
# Fires spurious system resets on some mobile chipsets (NM10, GM45) during
# early-boot modprobe storms. We set nowatchdog on the kernel cmdline but
# also refuse the driver for belt-and-suspenders.
blacklist iTCO_wdt

# --- floppy: dead hardware ---
# 20+ seconds of probing on old BIOS systems where the controller is wired
# up but there is no drive. Gone.
blacklist floppy

# --- joydev: slow to probe and not needed at boot ---
# Xorg loads joydev on demand when a gamepad is plugged in. Keeping it off
# the early path shaves ~80ms on every system.
blacklist joydev

# --- parport_pc: parallel port, mostly extinct ---
blacklist parport_pc
blacklist ppdev
blacklist lp

# --- sp5100_tco: buggy watchdog on old AMD SB700 southbridges ---
blacklist sp5100_tco

# --- DMI-based NVIDIA quirks handled in ai-hw-detect.service ---
# We can't blacklist nouveau globally because it is the *correct* driver on
# the GT218 / NVS 3100M once the "disable acceleration" workaround is applied
# at runtime. The hw-detect service pokes modeset=0 at load time.
