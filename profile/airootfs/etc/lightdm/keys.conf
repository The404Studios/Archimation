#
# LightDM greeter keybindings.
#
# Only matters when the greeter is actually shown (autologin-user-timeout=0
# bypasses it on normal boots).  Kept minimal and explicit so upstream
# default changes don't add surprises.
#
[keyring]
# XF86PowerOff on keyboards with a power key -- safer than leaving it
# bound to whatever the upstream default happens to be.
XF86PowerOff=suspend
