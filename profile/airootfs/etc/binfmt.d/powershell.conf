# binfmt_misc registration for PowerShell scripts (.ps1)
#
# Routes any executable .ps1 file to pwsh (PowerShell Core).  Effective only
# AFTER /usr/local/bin/pwsh exists -- run `bash /opt/ai-control/scripts/install-pwsh.sh`
# on the live system to install pwsh, then `systemctl restart systemd-binfmt`.
#
# Format: :name:type:offset:magic:mask:interpreter:flags
# Type 'E' = match by filename extension; flags 'OC' = open-binary + credentials.
:powershell:E::ps1::/usr/local/bin/pwsh:OC
