# 40-libinput-quirks.conf -- baseline libinput assignment.
#
# Arch's xf86-input-libinput package ships a default 40-libinput.conf
# at /usr/share/X11/xorg.conf.d/ that binds libinput to all input
# classes.  We add a MERGE here (NOT an override) to pin a handful
# of ergonomics options that otherwise need to be set per-DE in a
# way XFCE's settings daemon cannot express until after login --
# which is TOO LATE for the LightDM greeter.
#
# Everything here is a libinput option, so it applies uniformly on
# QEMU (virtio-input), real HW (PS/2 + USB), and hotplugged
# peripherals.

Section "InputClass"
    Identifier      "libinput pointer catchall extras"
    MatchIsPointer  "on"
    MatchDevicePath "/dev/input/event*"
    Driver          "libinput"
    Option          "AccelProfile"          "adaptive"
    Option          "MiddleEmulation"       "on"
EndSection

Section "InputClass"
    Identifier      "libinput touchpad catchall extras"
    MatchIsTouchpad "on"
    MatchDevicePath "/dev/input/event*"
    Driver          "libinput"
    Option          "Tapping"               "on"
    Option          "NaturalScrolling"      "on"
    Option          "DisableWhileTyping"    "on"
    Option          "ClickMethod"           "clickfinger"
EndSection
