#
# pacman.conf - AI Arch Linux ISO build configuration
#
# This is the pacman configuration used during ISO creation.
# It includes the standard Arch repositories plus a custom
# local repository for project-specific packages.
#

[options]
HoldPkg     = pacman glibc
Architecture = x86_64
CheckSpace
SigLevel    = Never
LocalFileSigLevel = Optional

# Misc options
# ParallelDownloads: pacman 6+ issues up to N concurrent HTTP GETs.
# 20 is the recommended modern default (matches fastest-mirror tools).
# Saturates most home links and keeps pacstrap package fetch the short pole.
ParallelDownloads = 20
# Color + VerbosePkgLists improve CI log readability without slowing anything down.
Color
VerbosePkgLists
# DisableDownloadTimeout lets pacman retry slow mirrors instead of aborting.
DisableDownloadTimeout
# ILoveCandy is harmless and amusing in build logs; shows a Pac-Man progress bar.
ILoveCandy

# --- Standard Arch Linux Repositories ---

[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

[multilib]
Include = /etc/pacman.d/mirrorlist

# --- Custom Local Repository ---
# Contains pe-loader, ai-control-daemon, ai-firewall,
# windows-services, and other project packages.
# The Server path is rewritten by scripts/build-iso.sh at build time.

[pe-compat]
SigLevel = Optional TrustAll
Server = file:///mnt/c/Users/wilde/Downloads/arch-linux-with-full-ai-control/repo/x86_64
