# Loopback configuration for booting from ISO file
# Used when the ISO is booted via GRUB's loopback device (e.g., from another OS)

menuentry "AI Arch Linux (x86_64, UEFI) - From ISO" --class arch --class linux {
    # S81 Agent 4: GPU-generic (no nvidia_drm.* params) so this entry works
    # regardless of host GPU when chainloaded from another OS's GRUB.
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% img_dev=$imgdevpath img_loop=$iso_path rootdelay=5 rd.udev.children-max=16 cow_spacesize=30G amd_pstate=active amd_iommu=on iommu=pt transparent_hugepage=madvise mitigations=auto nowatchdog quiet loglevel=3 rd.udev.log_level=3 vt.global_cursor_default=0 rd.systemd.show_status=auto vt.default_red=0x07,0xdc,0x85,0xb5,0x26,0xd3,0x2a,0xee,0x00,0xf2,0x99,0xe6,0x47,0xf9,0x54,0xfd vt.default_grn=0x36,0x32,0x99,0x89,0x8b,0x36,0xa1,0xee,0x2b,0x20,0xcc,0xdb,0x6d,0x26,0xfe,0xfe vt.default_blu=0x42,0x2f,0x00,0x00,0xd2,0x82,0x98,0xec,0x36,0x44,0x33,0x74,0xd7,0x77,0xfc,0xfe splash systemd.show_status=auto
    initrd /%INSTALL_DIR%/boot/intel-ucode.img /%INSTALL_DIR%/boot/amd-ucode.img /%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
}

menuentry "AI Arch Linux (x86_64, UEFI) - From ISO - NVIDIA (nvidia_drm KMS)" --class arch --class linux {
    # S81 Agent 4: NVIDIA-only variant; skip unless host has nvidia-open DKMS.
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% img_dev=$imgdevpath img_loop=$iso_path rootdelay=5 rd.udev.children-max=16 nvidia_drm.modeset=1 nvidia_drm.fbdev=1 NVreg_PreserveVideoMemoryAllocations=1 cow_spacesize=30G amd_pstate=active amd_iommu=on iommu=pt transparent_hugepage=madvise mitigations=auto nowatchdog quiet loglevel=3 rd.udev.log_level=3 vt.global_cursor_default=0 rd.systemd.show_status=auto vt.default_red=0x07,0xdc,0x85,0xb5,0x26,0xd3,0x2a,0xee,0x00,0xf2,0x99,0xe6,0x47,0xf9,0x54,0xfd vt.default_grn=0x36,0x32,0x99,0x89,0x8b,0x36,0xa1,0xee,0x2b,0x20,0xcc,0xdb,0x6d,0x26,0xfe,0xfe vt.default_blu=0x42,0x2f,0x00,0x00,0xd2,0x82,0x98,0xec,0x36,0x44,0x33,0x74,0xd7,0x77,0xfc,0xfe splash systemd.show_status=auto
    initrd /%INSTALL_DIR%/boot/intel-ucode.img /%INSTALL_DIR%/boot/amd-ucode.img /%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
}

menuentry "AI Arch Linux (x86_64, UEFI) - From ISO - Text Console (no X)" --class arch --class linux {
    # S81.5 Agent F: text-only loopback entry for diagnosing X crash
    # loops when the ISO is chainloaded from another OS's GRUB.
    # systemd.mask= + systemd.unit=multi-user.target force a pure text
    # boot; ai.mode=textonly is honored by ai-safe-mode-generator.
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% img_dev=$imgdevpath img_loop=$iso_path rootdelay=8 nomodeset cow_spacesize=30G amd_pstate=passive mitigations=auto nowatchdog loglevel=3 plymouth.enable=0 acpi=force nouveau.modeset=0 nvidia.modeset=0 radeon.modeset=0 amdgpu.modeset=0 i915.modeset=0 systemd.mask=lightdm.service systemd.mask=display-manager.service systemd.unit=multi-user.target ai.mode=textonly
    initrd /%INSTALL_DIR%/boot/intel-ucode.img /%INSTALL_DIR%/boot/amd-ucode.img /%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
}
