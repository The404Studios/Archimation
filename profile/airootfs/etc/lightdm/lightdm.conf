#
# LightDM Configuration for Archimation
# Autologin to XFCE desktop as 'arch' user
# Modified by fourzerofour
#

[LightDM]
run-directory=/run/lightdm

[Seat:*]
autologin-user=arch
autologin-session=xfce
greeter-session=lightdm-gtk-greeter
user-session=xfce
autologin-user-timeout=0
# CRITICAL: Set the session wrapper explicitly.
# Without this, LightDM tries to run "lightdm-session" which doesn't exist
# on Arch Linux, causing the session to fail immediately (exit code 1).
session-wrapper=/etc/lightdm/Xsession
# Auto-detect display DPI and set Xft.dpi for the greeter and session
display-setup-script=/etc/lightdm/display-setup.sh

[XDMCPServer]

[VNCServer]
