# systemd global timeout tuning.
#
# Default DefaultTimeoutStartSec/StopSec is 90 seconds -- a stuck service
# blocks shutdown for a minute and a half.  10s/15s is plenty for the set
# of services AI Arch ships, and matches Ubuntu's default.  For Plymouth
# and network-wait-online we've already applied per-unit overrides; this
# sets the global fallback.

[Manager]
DefaultTimeoutStartSec=15s
DefaultTimeoutStopSec=10s
# Don't wait forever on devices that vanished (e.g., USB stick pulled).
DefaultDeviceTimeoutSec=10s
# Enable systemd watchdog at 120 s so crashed services are caught fast.
RuntimeWatchdogSec=120s
# Limit cgroup resource controller overhead on old kernels
DefaultMemoryAccounting=yes
DefaultCPUAccounting=yes
