# journald tuning for faster boot.
#
# The live ISO forces Storage=volatile: there is no persistent journal
# to flush, and systemd-journal-flush becomes a no-op.  Installed systems
# get overriden by low-ram-services.sh on OLD hosts; NEW hosts inherit
# the full 500 MB rolling window below.

[Journal]
# Live ISO: RAM-only journal.  Installer wipes this file before the
# installed /etc lands, so persistent systems land on systemd defaults
# + any low-ram-services.sh override.
Storage=volatile
# Use journal files larger than 128 MB per file -- modern systems with
# 32+ GB RAM waste memory on tiny segments.
SystemMaxFileSize=128M
RuntimeMaxFileSize=32M
# Cap the runtime (tmpfs-backed) journal at 64 MB so it never starves /run.
RuntimeMaxUse=64M
# Don't compress until files seal (end of boot).  Saves ~5% CPU on startup.
Compress=yes
SplitMode=uid
# Keep a rolling window of 500 MB on disk -- enough for a month of debug.
SystemMaxUse=500M
# Don't forward to console at WARNING or above -- causes perceptible
# stall on slow VTs during a boot storm.
ForwardToConsole=no
ForwardToWall=no
# Rate-limit runaway services instead of killing boot.
RateLimitIntervalSec=30s
RateLimitBurst=5000
# Volatile storage means the flush service has nothing to do -- kill
# the 2-3 s stall it normally contributes.
MaxRetentionSec=1week
