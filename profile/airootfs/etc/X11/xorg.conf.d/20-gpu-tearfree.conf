# 20-gpu-tearfree.conf -- enable TearFree on AMD / modesetting drivers.
#
# TearFree forces the X server to wait for vblank before flipping the
# front-buffer, eliminating horizontal tearing at the cost of ~1 frame
# of latency.  Effectively free on compositors (xfwm4, picom, hyprland)
# since they already double-buffer, and a HUGE win on raw non-composited
# apps like fullscreen games.
#
# VariableRefresh kicks in on FreeSync/G-Sync-compatible displays to
# hand the refresh decision to the monitor (sub-frame latency).

Section "OutputClass"
    Identifier      "amdgpu tearfree"
    MatchDriver     "amdgpu"
    Driver          "amdgpu"
    Option          "TearFree"        "true"
    # Variable refresh rate works on any FreeSync monitor connected by
    # DisplayPort; harmless on non-FreeSync (just ignored by driver).
    Option          "VariableRefresh" "true"
    # DRI3: required by Vulkan-through-X11 path.  Default on mainline but
    # a few distros still ship DRI2 — pin for safety.
    Option          "DRI"             "3"
EndSection

Section "OutputClass"
    Identifier      "modesetting tearfree"
    MatchDriver     "modesetting"
    Driver          "modesetting"
    Option          "TearFree"        "true"
    Option          "VariableRefresh" "true"
    Option          "AccelMethod"     "glamor"
    Option          "DRI"             "3"
EndSection

Section "OutputClass"
    Identifier      "intel tearfree"
    MatchDriver     "i915"
    Driver          "modesetting"
    Option          "TearFree"        "true"
    Option          "AccelMethod"     "glamor"
    Option          "DRI"             "3"
EndSection

# nouveau: TearFree is supported on Fermi+ but crashes on Tesla (GT218).
# The ai-hw-detect service installs /etc/X11/xorg.conf.d/20-nouveau-legacy.conf
# with TearFree OFF on detected GT218 systems.
Section "OutputClass"
    Identifier      "nouveau tearfree"
    MatchDriver     "nouveau"
    Driver          "nouveau"
    Option          "TearFree"        "true"
    Option          "AccelMethod"     "glamor"
    Option          "DRI"             "3"
EndSection
