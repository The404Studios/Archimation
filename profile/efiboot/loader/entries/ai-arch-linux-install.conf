title   Install ArchWindows to Disk
linux   /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux
initrd  /%INSTALL_DIR%/boot/intel-ucode.img
initrd  /%INSTALL_DIR%/boot/amd-ucode.img
initrd  /%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
options archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% rootdelay=15 nvidia_drm.modeset=1 nvidia_drm.fbdev=1 cow_spacesize=30G amd_pstate=active quiet loglevel=3 splash systemd.show_status=auto ai.autoinstall=1
