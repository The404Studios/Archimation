# /etc/ai-control/modules.d/*.conf -- ai-driver-loader.service drop-ins
#
# This directory is consumed by /usr/bin/ai-load-drivers.sh, which runs
# After=systemd-modules-load.service so it composes with the stock
# /etc/modules-load.d/ pipeline rather than competing with it.
#
# Format (one entry per line):
#
#     # comments and blank lines are ignored
#     module_name
#     module_with_args param1=value param2=value
#
# Module names must match ^[a-zA-Z0-9_-]+$ (modprobe naming).  Anything
# else is rejected with a journal warning.
#
# Examples (commented out -- uncomment to enable):
#
#     # Xbox controller driver — usually auto-loaded on plug-in, but pinning
#     # it here makes it available before any user logs in (needed for
#     # auto-launchers that probe controllers at session start).
#     # xpad
#
#     # Loopback ALSA device — useful for OBS / streaming setups that need
#     # a virtual audio cable separate from PipeWire's null-sinks.
#     # snd-aloop pcm_substreams=2
#
#     # Old-controller HID driver (PlayStation 3 / generic Bluetooth).
#     # hid-sony
#
#     # USB MIDI for Steam Controller / Steam Deck dock controller mode.
#     # snd-usb-audio
#
# After dropping a file here run:  systemctl restart ai-driver-loader
# To inspect activity:              journalctl -u ai-driver-loader -b
