# bootc/systemd-measure.conf — ARCHWINDOWS UKI measurement + PCR 11 pinning.
#
# Session 72 / Agent γ / Phase 1 TPM2 attestation root.
#
# This file is consumed by bootc/build-bootc.sh (Agent α's orchestrator) as
# the single source of truth for:
#
#   (1) the kernel cmdline fragment baked into the Unified Kernel Image
#   (2) the systemd-measure invocation that pins PCR 11 for the shipped UKI
#   (3) the location where the expected PCR 11 digest is staged inside the
#       OCI image so trust_attest_init() can pick it up on boot
#
# PCR 11 is the UKI-canonical PCR per systemd's TPM2_PCR_MEASUREMENTS spec.
# systemd-stub measures {linux, initrd, cmdline, osrel, splash, dtb, uname,
# sbat, pcrsig, pcrpkey} into PCR 11 — any change to any UKI section bumps
# the PCR, which is exactly the property trust_attest.c needs to detect
# userspace tamper before /dev/trust is created.
#
# Layout of this file: shell-sourceable KEY=value pairs. build-bootc.sh:
#
#   source bootc/systemd-measure.conf
#   ${CMDLINE_FRAGMENT}              # added to UKI cmdline section
#   systemd-measure sign ... \
#       --pcr-public-key="${PCR_PUBKEY}" \
#       --pcr-private-key="${PCR_PRIVKEY}" \
#       --phase="${PCR_PHASE}"
#   systemd-measure calculate ... \
#       | tee "${EXPECTED_PCR_OUT_ABS}"
#
# None of this is evaluated by a subshell on its own — it's a config file.

# ---- Kernel cmdline fragment -------------------------------------------------
# Appended to the UKI's built-in cmdline section by sd-stub. Kept deliberately
# short: systemd TPM2 path + our attestation mode override hook + no gpt-auto
# (we provision mounts explicitly in the bootc image, don't want races).
CMDLINE_FRAGMENT='trust.attest=hardware rd.systemd.gpt_auto=no rootflags=ro'

# ---- PCR bank + index --------------------------------------------------------
# SHA-256 only. TPM 1.2 chips (SHA-1 bank) are refused by trust_attest.c
# regardless — writing an expected SHA-1 digest here would be a footgun.
PCR_BANK='sha256'
PCR_INDEX='11'

# ---- systemd-measure inputs --------------------------------------------------
# Paths are relative to the bootc image root at build time. build-bootc.sh
# substitutes absolute paths inside the build container.
UKI_LINUX='/usr/lib/modules/*/vmlinuz'
UKI_INITRD='/boot/initramfs-*.img'
UKI_OSREL='/etc/os-release'
UKI_CMDLINE_FILE='/etc/kernel/cmdline'

# ---- Signing material --------------------------------------------------------
# These keys are generated by bootc/trust-keys/ (Agent δ owns the key
# material; Agent γ consumes the public half at measure-and-sign time).
# Each bootc image rotation SHOULD rotate the UKI signing key; build-bootc.sh
# refuses to build if both files are missing.
PCR_PUBKEY='bootc/trust-keys/uki-pcr.pub.pem'
PCR_PRIVKEY='bootc/trust-keys/uki-pcr.priv.pem'

# Phase string pinned at boot. 'enter-initrd' is the systemd-stub phase that
# matches what trust_attest_init observes; do NOT change this without also
# updating trust_attest.c (the PCR value is phase-dependent).
PCR_PHASE='enter-initrd'

# ---- Expected-value staging -------------------------------------------------
# After `systemd-measure calculate` emits the SHA-256 digest, build-bootc.sh
# writes it verbatim (64 hex chars + newline) to this path INSIDE the OCI
# image rootfs. trust_attest.c opens this path from kernel space via
# kernel_read_file_from_path at module init time.
EXPECTED_PCR_OUT_ABS='/etc/archwindows/expected-pcr-11'

# Permissions: world-readable (no secrets), owned by root, 0444. If the file
# is writable at runtime, an attacker with local root can paper over a
# tamper — the measurement itself is unforgeable, but the expected-value
# file is not and must be protected by the bootc immutable-/usr substrate
# plus sane ownership. Agent α's Containerfile is responsible for staging
# /etc/archwindows into /usr and symlinking as needed.
EXPECTED_PCR_MODE='0444'
EXPECTED_PCR_OWNER='root:root'

# ---- Post-build hook (comment — actual work done by build-bootc.sh) ---------
#
# After UKI assembly and PCR measurement, build-bootc.sh should run:
#
#   systemd-measure sign \
#       --linux="${UKI_LINUX}" \
#       --initrd="${UKI_INITRD}" \
#       --os-release="${UKI_OSREL}" \
#       --cmdline="${UKI_CMDLINE_FILE}" \
#       --bank="${PCR_BANK}" \
#       --phase="${PCR_PHASE}" \
#       --pcr-public-key="${PCR_PUBKEY}" \
#       --pcr-private-key="${PCR_PRIVKEY}" \
#       --json=short \
#     | jq -r '.sha256[] | select(.phase=="enter-initrd") | .pcr' \
#     > "${IMAGE_ROOTFS}${EXPECTED_PCR_OUT_ABS}"
#
#   chmod "${EXPECTED_PCR_MODE}" "${IMAGE_ROOTFS}${EXPECTED_PCR_OUT_ABS}"
#   chown "${EXPECTED_PCR_OWNER}" "${IMAGE_ROOTFS}${EXPECTED_PCR_OUT_ABS}"
#
# That single file is the contract between the bootc image build and
# trust_attest_init().  Its presence + correct digest is what promotes the
# running kernel from SOFTWARE to HARDWARE attestation mode.
#
# On TPM-less targets (old laptops, virt guests without swtpm, WSL2) the
# file is still shipped — trust_attest.c simply never reaches the memcmp,
# because tpm_chip_find_get returns NULL earlier and we settle into
# SOFTWARE mode with a dmesg pr_warn.  No silent degradation.
