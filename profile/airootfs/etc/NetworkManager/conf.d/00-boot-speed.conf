# NetworkManager boot-speed tuning.
#
# Disable the connectivity check during early boot.  NM default is to
# fetch http://nmcheck.gnome.org/check_network_status.txt every 300 s AND
# once at startup; on live ISO without DNS yet, this startup fetch blocks
# for the full libcurl timeout (~20 s) before timing out.  We turn off
# the HTTP probe entirely; the captive-portal popup is still triggered
# by NetworkManager's own DBus signals when a portal is detected.
#
# This file is overridden by any /etc/NetworkManager/NetworkManager.conf
# `[connectivity]` section (applied in customize_airootfs.sh) -- that's
# intentional: installed systems with full network can opt back in.

[connectivity]
enabled=false
# interval=0 also disables it for belt-and-suspenders
interval=0

# Use iwd as WiFi backend instead of wpa_supplicant.
# wpa_supplicant is masked (setup-services.sh); without this setting
# NM silently fails all WiFi operations because it can't spawn wpa_supplicant.
[device]
wifi.backend=iwd
