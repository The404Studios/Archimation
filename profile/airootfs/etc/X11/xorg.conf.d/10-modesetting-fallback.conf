# Fallback: Use modesetting driver for ANY GPU that supports KMS.
# This ensures X starts even without proprietary drivers (nvidia, etc.)
# Proprietary drivers override this via higher-priority configs (e.g., 20-nvidia.conf).
Section "Device"
    Identifier "Modesetting"
    Driver     "modesetting"
    Option     "AccelMethod" "glamor"
EndSection
