# 20-nouveau-legacy.conf -- safe Xorg config for GT218-class nouveau.
#
# The Tesla-generation (GT218/GT215) nouveau driver has a known-bad
# interaction with TearFree: the flip-queue fills up under load and the
# whole tile cache gets flushed, producing multi-second hitches.  We
# explicitly turn TearFree OFF on nouveau when the card is legacy and
# leave compositing to picom/xfwm4 which is much gentler.
#
# ai-hw-detect.sh renames this file to *.disabled on Maxwell+ NVIDIA hosts
# so modern NVIDIA boxes get TearFree via 20-gpu-tearfree.conf above.
#
# S81.5 Agent X2 -- CHANGED from "Section Device" to "Section OutputClass"
# with MatchDriver "nouveau".  The old form installed a Device section
# UNCONDITIONALLY and on Intel/AMD/nvidia-proprietary hosts (where
# ai-hw-detect.sh does NOT rename the file -- line 260 only handles
# modern-NVIDIA), Xorg tried to bind the nouveau DDX to whichever GPU
# happened to be first in the PCI scan.  On machines without a nouveau-
# attached GPU that produces an (EE) "NOUVEAU(0): [drm] failed to open
# device" log and Xorg exits 1, LightDM respawns, loops.  MatchDriver is
# a no-op when the named DRM driver isn't loaded -- safe everywhere.

Section "OutputClass"
    Identifier  "nouveau legacy"
    MatchDriver "nouveau"
    Driver      "nouveau"
    # Fallback to VESA-style shadowfb if the accel path stalls.  SWcursor
    # avoids the hardware cursor corruption seen on NVS 3100M.
    Option      "ShadowFB"      "on"
    Option      "SWcursor"      "on"
    Option      "NoAccel"       "false"
    Option      "GLXVBlank"     "on"
    # Explicit TearFree=off to override the 20-gpu-tearfree.conf
    # "nouveau tearfree" OutputClass -- both match MatchDriver nouveau;
    # without this, the tearfree file wins and re-enables the bug this
    # file was created to avoid.  Operator on modern NVIDIA gets this
    # config renamed to .disabled by ai-hw-detect.sh, so this setting
    # only sticks on actual pre-Kepler nouveau hosts.
    Option      "TearFree"      "off"
    # Keep DRI2 for compatibility with the very-old Mesa path on this HW.
    Option      "DRI"           "2"
EndSection
