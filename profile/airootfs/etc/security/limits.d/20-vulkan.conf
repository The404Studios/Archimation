# 20-vulkan.conf -- raise ulimits for Vulkan + graphics workloads.
#
# Vulkan apps map large chunks of VRAM into their address space and pin
# them with mlock() for zero-copy CPU<->GPU sharing.  The default 8 MiB
# memlock limit is far too low: a single DXVK swapchain on 1080p with
# triple-buffering is ~100 MiB, and a big game can want several GiB of
# staging buffers pinned.
#
# We also raise RTPRIO so compositor threads (pipewire-pulse for game
# audio, Hyprland) can use SCHED_RR without needing sudo.  Default is 0;
# 40 matches what most distros set for the 'audio' group.

# - means soft AND hard (set both).  'unlimited' on memlock lets the kernel
# allocate whatever mlock/MAP_LOCKED requests -- it's already bounded by
# RLIMIT_AS (address space) and the actual RAM available.
*               -       memlock         unlimited

# Real-time priority ceiling.  Vulkan drivers use SCHED_NORMAL in normal
# paths; RTPRIO 40 is here for compositor / audio helpers that spawn a
# SCHED_RR thread for present-timing.
*               -       rtprio          40

# Nice ceiling: allow nice -10 without CAP_SYS_NICE.  Compositor
# background threads benefit from a small nice boost when foreground
# apps are GPU-heavy.
*               -       nice            -10

# File descriptor count: Vulkan loader + ICDs + layers can each open
# 20-50 fds.  The default 1024 is fine until you add gamescope + pipewire
# + DXVK + an instrumented game.  Raise to 65536 (matches steam's own).
*               -       nofile          65536
