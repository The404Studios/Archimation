# Userspace HID driver -- loaded at boot so ai-control-daemon can create
# virtual HID devices (keyboard, mouse, gamepad) via /dev/uhid.
#
# uhid has been in-tree since Linux 3.6 (2012).  It replaces uinput for
# HID-shaped devices: a uhid-created device presents full HID reports and
# goes through the regular hid-core layer, which means:
#   - games that read gamepad state via HIDAPI see it transparently
#   - Wayland compositors with libinput pick it up as a normal input device
#   - the kernel applies the standard HID layout mapping (no per-app quirks)
#
# Coexists with uinput (/etc/modules-load.d/uinput.conf) -- the daemon picks
# the right path per workload.  uhid for gamepads/HOTAS (HID-shaped), uinput
# for arbitrary key + absolute-position synthesis.
uhid
