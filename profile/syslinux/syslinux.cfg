# SYSLINUX configuration for ArchWindows
# Modified by fourzerofour
# Used for BIOS boot mode

DEFAULT arch
PROMPT 1
TIMEOUT 50

UI vesamenu.c32

MENU TITLE ArchWindows - modified by fourzerofour
MENU COLOR border       30;44   #40ffffff #a0000000 std
MENU COLOR title        1;36;44 #9017a3d1 #a0000000 std
MENU COLOR sel          7;37;40 #e0ffffff #20ffffff all
MENU COLOR unsel        37;44   #50ffffff #a0000000 std
MENU COLOR help         37;40   #c0ffffff #a0000000 std
MENU COLOR timeout_msg  37;40   #80ffffff #00000000 std
MENU COLOR timeout      1;37;40 #c0ffffff #00000000 std
MENU COLOR msg07        37;40   #90ffffff #a0000000 std
MENU COLOR tabmsg       31;40   #30ffffff #00000000 std

LABEL arch
    MENU LABEL ArchWindows - Boot (BIOS)
    LINUX /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux
    INITRD /%INSTALL_DIR%/boot/intel-ucode.img,/%INSTALL_DIR%/boot/amd-ucode.img,/%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
    APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% rootdelay=15 nvidia_drm.modeset=1 nvidia_drm.fbdev=1 cow_spacesize=30G amd_pstate=active amd_iommu=on iommu=pt transparent_hugepages=always quiet loglevel=3 rd.udev.log_level=3 vt.global_cursor_default=0 rd.systemd.show_status=auto vt.default_red=0x07,0xdc,0x85,0xb5,0x26,0xd3,0x2a,0xee,0x00,0xf2,0x99,0xe6,0x47,0xf9,0x54,0xfd vt.default_grn=0x36,0x32,0x99,0x89,0x8b,0x36,0xa1,0xee,0x2b,0x20,0xcc,0xdb,0x6d,0x26,0xfe,0xfe vt.default_blu=0x42,0x2f,0x00,0x00,0xd2,0x82,0x98,0xec,0x36,0x44,0x33,0x74,0xd7,0x77,0xfc,0xfe splash systemd.show_status=auto

LABEL arch_persist
    MENU LABEL ArchWindows - Boot with Persistence
    LINUX /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux
    INITRD /%INSTALL_DIR%/boot/intel-ucode.img,/%INSTALL_DIR%/boot/amd-ucode.img,/%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
    APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% rootdelay=15 nvidia_drm.modeset=1 nvidia_drm.fbdev=1 cow_label=AI_PERSIST cow_flags=defaults,noatime cow_spacesize=30G amd_pstate=active amd_iommu=on iommu=pt transparent_hugepages=always quiet loglevel=3 rd.udev.log_level=3 vt.global_cursor_default=0 rd.systemd.show_status=auto vt.default_red=0x07,0xdc,0x85,0xb5,0x26,0xd3,0x2a,0xee,0x00,0xf2,0x99,0xe6,0x47,0xf9,0x54,0xfd vt.default_grn=0x36,0x32,0x99,0x89,0x8b,0x36,0xa1,0xee,0x2b,0x20,0xcc,0xdb,0x6d,0x26,0xfe,0xfe vt.default_blu=0x42,0x2f,0x00,0x00,0xd2,0x82,0x98,0xec,0x36,0x44,0x33,0x74,0xd7,0x77,0xfc,0xfe splash systemd.show_status=auto

LABEL arch_ram
    MENU LABEL ArchWindows - Boot to RAM
    LINUX /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux
    INITRD /%INSTALL_DIR%/boot/intel-ucode.img,/%INSTALL_DIR%/boot/amd-ucode.img,/%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
    APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% rootdelay=15 nvidia_drm.modeset=1 nvidia_drm.fbdev=1 copytoram cow_spacesize=30G amd_pstate=active amd_iommu=on iommu=pt transparent_hugepages=always quiet loglevel=3 rd.udev.log_level=3 vt.global_cursor_default=0 rd.systemd.show_status=auto vt.default_red=0x07,0xdc,0x85,0xb5,0x26,0xd3,0x2a,0xee,0x00,0xf2,0x99,0xe6,0x47,0xf9,0x54,0xfd vt.default_grn=0x36,0x32,0x99,0x89,0x8b,0x36,0xa1,0xee,0x2b,0x20,0xcc,0xdb,0x6d,0x26,0xfe,0xfe vt.default_blu=0x42,0x2f,0x00,0x00,0xd2,0x82,0x98,0xec,0x36,0x44,0x33,0x74,0xd7,0x77,0xfc,0xfe splash systemd.show_status=auto

LABEL arch_install
    MENU LABEL Install ArchWindows to Disk
    LINUX /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux
    INITRD /%INSTALL_DIR%/boot/intel-ucode.img,/%INSTALL_DIR%/boot/amd-ucode.img,/%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
    APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% rootdelay=15 nvidia_drm.modeset=1 nvidia_drm.fbdev=1 cow_spacesize=30G amd_pstate=active quiet loglevel=3 splash systemd.show_status=auto ai.autoinstall=1

LABEL arch_nomodeset
    MENU LABEL ArchWindows - Safe Mode (nomodeset)
    LINUX /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux
    INITRD /%INSTALL_DIR%/boot/intel-ucode.img,/%INSTALL_DIR%/boot/amd-ucode.img,/%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
    APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% rootdelay=15 nomodeset cow_spacesize=30G amd_pstate=active amd_iommu=on iommu=pt transparent_hugepages=always loglevel=3 plymouth.enable=0

LABEL arch_debug
    MENU LABEL ArchWindows - Debug (verbose, no splash)
    LINUX /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux
    INITRD /%INSTALL_DIR%/boot/intel-ucode.img,/%INSTALL_DIR%/boot/amd-ucode.img,/%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
    APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% rootdelay=15 nvidia_drm.modeset=1 cow_spacesize=30G amd_pstate=active plymouth.enable=0 systemd.log_level=info

LABEL hdt
    MENU LABEL Hardware Detection Tool (HDT)
    COM32 hdt.c32

LABEL reboot
    MENU LABEL Reboot
    COM32 reboot.c32

LABEL poweroff
    MENU LABEL Power Off
    COM32 poweroff.c32
