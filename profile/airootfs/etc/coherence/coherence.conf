# /etc/coherence/coherence.conf
#
# Runtime overrides for the coherence control daemon. ANY key left
# commented-out uses the compile-time constant from coherence_types.h;
# every uncommented key is logged LOUDLY at startup and on SIGHUP so
# operators can grep the journal for the active values.
#
# Grammar:  key = value   (# or ; introduces a comment to EOL)
#
# Reload:   systemctl reload coherence
#
# Validation: enter > exit for both threshold pairs. Weights should
# sum to ~1.0 (tolerance 5%). Alphas must be in (0, 1]. tau_hold <=
# transition_lockout. Violations are logged and revert to defaults.

# ===== Hysteresis thresholds (dimensionless) =====
# latency_pressure: composite(frametime variance, sched instability,
#                              io pressure); baseline ~ 1.0 is "uncomfortable".
#theta_latency_enter = 1.00
#theta_latency_exit  = 0.65
#
# thermal: (T - 45) / (95 - 45), so 0.85 ~= 87 C and 0.70 ~= 80 C.
#theta_thermal_enter = 0.85
#theta_thermal_exit  = 0.70

# ===== Composite weights (must ~= 1.0) =====
# Frametime dominates perception. Thermal is a constraint, not an
# optimisation target, hence its small weight.
#w_ft    = 0.55
#w_sched = 0.25
#w_io    = 0.15
#w_therm = 0.05

# ===== EMA smoothing (per signal), in (0, 1] =====
# Higher = faster reaction, noisier.
#alpha_ft_var     = 0.30
#alpha_cpu_temp   = 0.20
#alpha_sq_latency = 0.40
#alpha_migration  = 0.30

# ===== Dwell + lockout (milliseconds) =====
# tau_hold: how long a predicate must be true before we act.
# transition_lockout: after every state change, no further changes
# for this long. Must be >= tau_hold.
#tau_hold_ms           = 750
#transition_lockout_ms = 1500

# ===== Paths =====
# Stateful runtime (sockets, pid, etc.).
#state_dir = /var/run/coherence

# ===== Modes =====
# Observation only — do NOT write any sysfs/cgroup state. Useful for
# bring-up and for the offline simulator.
#dry_run = false

# Extra per-frame tracing. Verbose mode is noisy; do not leave on in
# production.
#verbose = false
