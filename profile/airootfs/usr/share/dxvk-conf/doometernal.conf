# DOOM Eternal -- DXVK overrides.
#
# DOOM Eternal's idTech 7 engine uses Vulkan natively on Linux already —
# if the user launches the D3D12 version we still want parity.  Force
# async off because idTech streams shaders in the background itself and
# async just eats memory.
dxvk.enableAsync = False
d3d11.relaxedBarriers = True
