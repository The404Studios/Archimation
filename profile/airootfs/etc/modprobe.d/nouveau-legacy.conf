# Nouveau options for legacy NVIDIA cards.
#
# The GT218 (NVS 3100M, GeForce 210/310/315) is covered by nouveau but the
# tiler used by `modeset=1` freezes the pipeline under load with the stock
# firmware blob.  Forcing accel off keeps the display responsive and lets
# us still use KMS for clean Plymouth rendering.
#
# This config is HARMLESS on newer cards: `noaccel=1` is a runtime switch
# and modern cards simply ignore the hint.  The ai-hw-detect service will
# remove this file on a machine confirmed to ship Maxwell+ silicon.

options nouveau config=NvGspRm=0
# noaccel=1 disables the 2D/3D engines -- we keep compositing on the CPU
# for these old cards; it is still faster than VESA fallback.
options nouveau noaccel=1
