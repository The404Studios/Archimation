title   AI Arch Linux (x86_64, UEFI) - Text Console (no X, no display manager)
linux   /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux
initrd  /%INSTALL_DIR%/boot/intel-ucode.img
initrd  /%INSTALL_DIR%/boot/amd-ucode.img
initrd  /%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
# S81.5 Agent F: text-only boot for diagnosing X/lightdm crash loops.
# - nomodeset + plymouth.enable=0 (matches Safe Mode)
# - systemd.mask=lightdm.service + systemd.mask=display-manager.service
#   are standard systemd kernel cmdline flags (systemd parses them from
#   /proc/cmdline and masks the named units for this boot only).
# - systemd.unit=multi-user.target forces the boot target to text mode
#   regardless of what the default.target symlink points at.
# - ai.mode=textonly is an extra fallback honored by
#   /usr/lib/systemd/system-generators/ai-safe-mode-generator.
options archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% rootdelay=8 nomodeset cow_spacesize=30G amd_pstate=passive mitigations=auto nowatchdog loglevel=3 plymouth.enable=0 acpi=force nouveau.modeset=0 nvidia.modeset=0 radeon.modeset=0 amdgpu.modeset=0 i915.modeset=0 systemd.mask=lightdm.service systemd.mask=display-manager.service systemd.unit=multi-user.target ai.mode=textonly
