# Create the "trust" system group at first boot.
#
# Referenced by /etc/udev/rules.d/70-trust.rules, which chgrp's
# /dev/trust to this group so only trust-enrolled services (notably
# ai-control.service via SupplementaryGroups=trust) can issue
# TRUST_IOC_QUARANTINE or other /dev/trust ioctls.
#
# System GID is auto-assigned by systemd-sysusers. If the
# trust-dkms package's future install script creates this group too,
# sysusers is idempotent -- second create becomes a no-op.
#
# Session 41 agent 3: authority enforcement hardening.
g trust - -
