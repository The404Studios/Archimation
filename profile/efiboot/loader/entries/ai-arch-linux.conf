title   AI Arch Linux (x86_64, UEFI)  [try this first]
linux   /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux
initrd  /%INSTALL_DIR%/boot/intel-ucode.img
initrd  /%INSTALL_DIR%/boot/amd-ucode.img
initrd  /%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
# S81 Agent 4: default is GPU-generic (no nvidia_drm.* params). See
# ai-arch-linux-nvidia.conf for the NVIDIA-specific entry.
options archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% rootdelay=5 rd.udev.children-max=16 cow_spacesize=30G amd_pstate=active amd_iommu=on iommu=pt transparent_hugepage=madvise mitigations=auto nowatchdog quiet loglevel=3 rd.udev.log_level=3 vt.global_cursor_default=0 rd.systemd.show_status=auto vt.default_red=0x07,0xdc,0x85,0xb5,0x26,0xd3,0x2a,0xee,0x00,0xf2,0x99,0xe6,0x47,0xf9,0x54,0xfd vt.default_grn=0x36,0x32,0x99,0x89,0x8b,0x36,0xa1,0xee,0x2b,0x20,0xcc,0xdb,0x6d,0x26,0xfe,0xfe vt.default_blu=0x42,0x2f,0x00,0x00,0xd2,0x82,0x98,0xec,0x36,0x44,0x33,0x74,0xd7,0x77,0xfc,0xfe splash systemd.show_status=auto
