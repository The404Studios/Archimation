# tmpfiles.d for pe-objectd (object broker) - Session 38
#
# Ensures persistent and runtime directories exist with correct
# permissions before the broker starts.  Without these, a fresh boot
# would race broker startup against directory creation:
#   - /var/lib/pe-compat/registry/ is the canonical hive root (pinned
#     via HOME=/var/lib/pe-compat in pe-objectd.service.d/hive-env.conf).
#     First-boot registry population depends on its existence.
#   - /run/pe-objectd/ is the runtime discoverability directory that
#     pe-objectd populates with socket/pid/rundir entries for external
#     tooling (smoke tests, log collectors).  systemd's RuntimeDirectory=
#     doesn't help because the service's primary RuntimeDirectory is
#     pe-compat (for the actual socket), and a second one would require
#     a service-file change.  A tmpfiles.d rule keeps it lightweight.
#
# Written as a separate file (not merged into ai-arch.conf) so the
# windows-services package can own it and uninstalling that package
# cleans these up.

# --- Persistent registry hive root (HOME for pe-objectd) ---
d /var/lib/pe-compat           0755 root root -
d /var/lib/pe-compat/registry  0755 root root -

# --- Transient broker runtime dir (discoverability mirror) ---
# Mode 0755 so non-root processes can readlink() the socket/pid targets
# without needing group membership.  The socket itself stays 0770 under
# /run/pe-compat (set by the broker via chmod) -- this dir only holds
# symlinks and the pidfile, no sensitive IPC.
d /run/pe-objectd              0755 root root -
