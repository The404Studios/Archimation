# AI Arch Linux -- tmpfiles.d entries.
#
# Managed directories that must exist on every boot with correct perms.
# Written as tmpfiles rather than bake-into-squashfs so we don't have to
# worry about archiso's overlay shadowing them.

# --- /run/ai-arch for transient state (hw profile, runtime settings) ---
d /run/ai-arch 0755 root root -
f /run/ai-arch-hw-profile 0644 root root - PROFILE=DEFAULT

# --- Persist directories needed by AI daemon + firewall ---
d /var/lib/ai-arch 0755 root root -
d /var/log/ai-arch 0755 root root -
d /var/cache/ai-arch 0755 root root -

# --- Shader caches (DXVK / VKD3D / Mesa / NV GL) ---
# World-writable+sticky so every user can have their own cache subdir
# without root writes; matches the model gpu-profile.sh expects.
d /var/cache/ai-arch/shaders       1777 root root -
d /var/cache/ai-arch/shaders/dxvk  1777 root root -
d /var/cache/ai-arch/shaders/vkd3d 1777 root root -
d /var/cache/ai-arch/shaders/gl    1777 root root -

# --- Live-ISO tmpfs shader cache (mirrors /var/cache path) ---
# gpu-profile.sh picks this branch when /run/archiso exists.
d /run/ai-arch/shaders       1777 root root -
d /run/ai-arch/shaders/dxvk  1777 root root -
d /run/ai-arch/shaders/vkd3d 1777 root root -
d /run/ai-arch/shaders/gl    1777 root root -

# --- Ensure /tmp quirks are applied correctly on live ISO ---
# (tmp.mount.d/size.conf sets the actual size cap)
D! /tmp 1777 root root 1d

# --- Clean up old coredumps on boot (save precious live-ISO space) ---
e /var/lib/systemd/coredump - - - 3d

# --- Coherence daemon state dir (Session 33 control loop) ---
# ReadWritePaths in coherence.service names both /run/coherence AND
# /var/run/coherence. The latter is the classic compat symlink created
# by tmpfiles upstream; we just need /run/coherence to exist before
# coherenced starts. mkdir in coh_loop_init is best-effort but with
# ProtectSystem=strict + ReadWritePaths=/run/coherence the bind mount
# requires the source path to exist at service start.
d /run/coherence 0755 root root -

# --- Coherence setpoint overrides (Session 42 cortex↔coherence bridge) ---
# ai-control.service's ReadWritePaths names /etc/coherence/overrides; the
# hardened namespace setup requires the path to exist at spawn time, and
# the bridge writes here atomically at PE_LOAD. Keep permissions open to
# root only — the daemon runs as root.
d /etc/coherence          0755 root root -
d /etc/coherence/overrides 0755 root root -

# --- Generated stubs dir referenced by ai-control.service ReadWritePaths ---
d /tmp/generated-stubs 1777 root root -

# --- Additional dirs ai-control.service binds read-write ---
d /var/lib/ai-control        0755 root root -
d /var/lib/ai-control-daemon 0755 root root -
d /var/lib/pe-compat/trust-history 0755 root root -
d /run/ai-control-daemon     0755 root root -
d /var/log/ai-control        0755 root root -
d /var/log/ai-control-daemon 0755 root root -

# --- PE compatibility runtime dir ---
# pe-objectd.service declares RuntimeDirectory=pe-compat so systemd
# normally creates this, but ai-cortex.service and pe-compat-firewall
# both name /run/pe-compat in their ReadWritePaths and will fail
# namespace setup if the dir is absent at *their* start time (cortex
# can start before the broker in degraded-graph boots).  Pre-creating
# via tmpfiles removes the ordering race.
d /run/pe-compat 0755 root root -

# --- Pre-create user runtime dir so PipeWire can bind at boot ---
# XDG_RUNTIME_DIR is usually created by logind, but on some failure
# paths logind is delayed past pipewire startup.  Pre-creating is safe.
d /run/user 0755 root root -
