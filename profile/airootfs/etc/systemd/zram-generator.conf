# zram-generator -- runtime-compressed RAM-backed swap.
#
# On low-memory systems (<=4 GB) zram gives us an effective 1.5-2x memory
# multiplier for cache-friendly workloads at the cost of ~15% CPU during
# page faults.  On systems with plenty of RAM (>8 GB) we still keep a small
# zram device as a write-staging buffer for dirty pages -- that way the
# kernel can dump cold anonymous memory from hot working set without
# touching slow swap-on-disk (if any).
#
# zram-size is an expression evaluated per-boot.  We scale inversely with
# physical RAM: more RAM -> less zram needed.

[zram0]
# Cap at 4 GB so we don't over-allocate on servers with 128+ GB.
# min(ram/2, 4GB) on small systems becomes ram/2; on large systems 4 GB.
zram-size = min(ram / 2, 4096)
compression-algorithm = zstd
swap-priority = 100
# fs-type not set -> swap device
