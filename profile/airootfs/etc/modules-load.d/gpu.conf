# Load GPU kernel modules at boot for KMS/display.
#
# Why explicit modules-load.d instead of trusting udev autoload:
#   Early KMS (module loaded in initramfs OR before display-manager) gives a
#   seamless handoff from Plymouth to X. Late loading causes a visible flash
#   when the driver switches the display mode after the compositor starts.
#
# Why nouveau is NOT listed:
#   Known HANG on GT218/NVS 3100M when force-loaded early (reported in-tree).
#   udev still auto-loads it via modalias on supported cards -- we just don't
#   want it probed in parallel with the splash.
#
# i915        -- Intel integrated (Ironlake -> Alder/Raptor Lake)
# amdgpu      -- AMD GCN 1.0+ (Southern Islands 2012 onward, RX 400+, all Ryzen iGPUs)
# radeon      -- AMD pre-GCN (R600/R700/Evergreen/Northern Islands -- HD 2000
#                through HD 7000 TeraScale, also the only driver that works
#                for Radeon IGP cards from the Athlon 64 X2 era)
i915
amdgpu
radeon
