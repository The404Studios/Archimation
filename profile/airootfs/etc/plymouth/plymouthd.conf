# plymouthd.conf — Plymouth daemon configuration for AI Arch Linux ISO.
#
# USER-REPORTED BUG (Session 38+): Pressing the power button during the
# boot animation flashed raw "kernel initialization" text before power-off.
# Root cause: no Theme= was set here, so plymouthd fell back to the
# built-in 'text' renderer at shutdown and leaked dmesg to the console.
#
# Fix: pin the theme to the custom archimation theme that is installed
# at /usr/share/plymouth/themes/archimation/archimation.plymouth by this
# same airootfs tree. The theme is script-based (ModuleName=script) and
# already has a quit_callback() that fades the splash out smoothly —
# that fade now plays on power-off/reboot/halt as well.
#
# ShowDelay=0 means: show the splash as early as plymouthd can render a
# frame. DeviceTimeout=8 gives DRM/framebuffer 8s to come up before we
# give up and render to text (still better than the kernel log leaking).

[Daemon]
Theme=archimation
ShowDelay=0
DeviceTimeout=8
