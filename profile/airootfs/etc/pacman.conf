#
# /etc/pacman.conf - AI Arch Linux runtime configuration
#

[options]
HoldPkg     = pacman glibc
Architecture = auto
CheckSpace
SigLevel    = Required DatabaseOptional
LocalFileSigLevel = Optional
ParallelDownloads = 5

Color
ILoveCandy
VerbosePkgLists

[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

[multilib]
Include = /etc/pacman.d/mirrorlist

# Custom local repository (AI Arch Linux packages)
# On live ISO: packages are in the squashfs at /var/cache/pacman/pkg/
# On installed system: server path is updated by the installer
[pe-compat]
SigLevel = Optional TrustAll
Server = file:///var/lib/pe-compat/repo
