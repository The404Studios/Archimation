# AI Arch Linux GRUB Configuration
# Modified by fourzerofour
#
# This config is used when booting the ISO in UEFI mode.

insmod part_gpt
insmod part_msdos
insmod fat
insmod iso9660
insmod all_video
insmod font
insmod png
insmod gfxterm

set default="0"
# Short timeout -- if the user doesn't hit a key in 2 seconds we boot.
# Legacy BIOS systems tend to have jittery keyboard init so we keep the
# timer *positive* (not 0); pressing any key during that window cancels it.
set timeout="2"
# gfxmode: list the biggest modes first.  GRUB walks the list and picks the
# first one the GPU actually advertises -- on a GT218 with <=128 MB VRAM it
# settles at 1024x768 which is still a clean render.
set gfxmode="3840x2160,2560x1440,1920x1080,1280x1024,1024x768,800x600,auto"
set gfxpayload="keep"

# Load fonts -- unicode.pf2 first (required for gfxterm), then theme fonts
if loadfont "${prefix}/fonts/unicode.pf2"; then
    terminal_output gfxterm
fi

# Load theme font files if present
for fontfile in "${prefix}/themes/archwindows/DejaVu_Sans_Regular_10.pf2" \
                "${prefix}/themes/archwindows/DejaVu_Sans_Regular_12.pf2" \
                "${prefix}/themes/archwindows/DejaVu_Sans_Regular_14.pf2" \
                "${prefix}/themes/archwindows/DejaVu_Sans_Bold_14.pf2"   \
                "${prefix}/themes/archwindows/DejaVu_Sans_Bold_24.pf2"; do
    if [ -f "$fontfile" ]; then
        loadfont "$fontfile"
    fi
done

# Load AI Arch Linux GRUB theme
if [ -d "${prefix}/themes/archwindows" ]; then
    set theme="${prefix}/themes/archwindows/theme.txt"
fi

# Fallback colors (used when theme is unavailable)
set color_normal=white/black
set color_highlight=cyan/dark-gray
set menu_color_normal=light-cyan/black
set menu_color_highlight=white/dark-gray

menuentry "  AI Arch Linux  -  Boot (UEFI)" --class arch --class linux {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% rootdelay=5 rd.udev.children-max=16 nvidia_drm.modeset=1 nvidia_drm.fbdev=1 amd_pstate=active amd_iommu=on iommu=pt transparent_hugepage=madvise mitigations=auto nowatchdog cow_spacesize=30G quiet loglevel=3 rd.udev.log_level=3 vt.global_cursor_default=0 rd.systemd.show_status=auto vt.default_red=0x07,0xdc,0x85,0xb5,0x26,0xd3,0x2a,0xee,0x00,0xf2,0x99,0xe6,0x47,0xf9,0x54,0xfd vt.default_grn=0x36,0x32,0x99,0x89,0x8b,0x36,0xa1,0xee,0x2b,0x20,0xcc,0xdb,0x6d,0x26,0xfe,0xfe vt.default_blu=0x42,0x2f,0x00,0x00,0xd2,0x82,0x98,0xec,0x36,0x44,0x33,0x74,0xd7,0x77,0xfc,0xfe splash systemd.show_status=auto
    initrd /%INSTALL_DIR%/boot/intel-ucode.img /%INSTALL_DIR%/boot/amd-ucode.img /%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
}

