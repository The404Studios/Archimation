# 00-keyboard.conf -- baseline keyboard layout.
#
# Without this file Xorg falls back to the built-in "us" layout
# with no options.  Ship a real config so localectl / keymap
# changes survive an X restart, and so the Meta key behaves as
# expected in tiling/compositor shortcuts.
#
# This file is LAYOUT-ONLY -- it does NOT set a driver (libinput
# autodetect handles that via 40-libinput-quirks.conf).

Section "InputClass"
    Identifier      "system-keyboard"
    MatchIsKeyboard "on"
    Option          "XkbLayout"   "us"
    Option          "XkbModel"    "pc105"
    # terminate:ctrl_alt_bksp -- restore the classic Ctrl+Alt+Backspace
    # "zap" sequence.  Invaluable when a compositor hangs the session
    # and SysRq is not available (QEMU without -no-reboot).
    Option          "XkbOptions"  "terminate:ctrl_alt_bksp"
EndSection
