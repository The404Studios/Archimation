# AI Arch Linux -- TCP/IP stack tuning.
#
# These are universal defaults that benefit both OLD (hotel/coffee-shop WiFi)
# and NEW HW (fibre, 10 GbE).  Socket-buffer maxima (rmem_max/wmem_max) and
# tcp_rmem/tcp_wmem are HW-tiered -- see /usr/lib/ai-arch/sysctl-tune.sh.

# --- Congestion control -----------------------------------------------------
# BBR gives 2-3x throughput over cubic on lossy WiFi and matches cubic on
# clean fibre.  Requires `fq` qdisc for pacing to work correctly; without fq
# BBR degrades to pacing-less mode and delivers a few % of its promised win.
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr

# --- Socket buffers (HW-tier overrides in 90-ai-arch-hw.conf) --------------
# These are the STATIC ceilings.  sysctl-tune.sh will RAISE them on NEW HW
# (16 MiB) or LOWER on OLD HW (256 KiB).  4 MiB is a safe middle-ground.
net.core.rmem_max = 4194304
net.core.wmem_max = 4194304
net.core.rmem_default = 262144
net.core.wmem_default = 262144
net.ipv4.tcp_rmem = 4096 131072 4194304
net.ipv4.tcp_wmem = 4096 65536 4194304
# Global TCP memory pressure watermarks (pages).  Autotuned by kernel, but
# bump optmem_max so control messages for multicast/IPv6 don't get clipped.
net.core.optmem_max = 65536
# netdev_max_backlog: packets queued when kernel can't keep up with NIC.
# 5000 prevents drops on bursty 10 GbE; harmless on 100 Mbit hardware.
net.core.netdev_max_backlog = 5000
# somaxconn: listen() backlog.  Default 4096 (newer kernels); keep explicit
# so nginx/sshd on older kernels still get sane value.
net.core.somaxconn = 4096

# --- TCP feature enablement -------------------------------------------------
# TCP Fast Open: save 1 RTT on connection reuse.  Mode 3 = client + server.
# Requires kernel support (>=3.7) and cookie on server side; safe to enable.
net.ipv4.tcp_fastopen = 3
# MTU probing: PLPMTUD.  Critical on hotel/conference WiFi where ICMP is
# blocked and black-hole MTU issues silently stall TCP.
net.ipv4.tcp_mtu_probing = 1
# Don't restart slow-start after a brief idle (keep cwnd high for SSH/web).
net.ipv4.tcp_slow_start_after_idle = 0
# SYN cookies: resist SYN floods without breaking normal connections.
net.ipv4.tcp_syncookies = 1
# Shorter FIN_WAIT2 reduces sockets-in-TIME_WAIT on busy clients.
net.ipv4.tcp_fin_timeout = 15
# Reuse TIME_WAIT sockets for new outgoing connections (safe on modern kernels).
net.ipv4.tcp_tw_reuse = 1
# Keepalive: detect dead peers faster on wireless links.  Default 7200 s
# (2 h) is insane for laptop workloads.
net.ipv4.tcp_keepalive_time = 600
net.ipv4.tcp_keepalive_intvl = 30
net.ipv4.tcp_keepalive_probes = 6
# SACK / DSACK / timestamps: standard modern TCP features, kept explicit.
net.ipv4.tcp_sack = 1
net.ipv4.tcp_dsack = 1
net.ipv4.tcp_timestamps = 1
# Backlog for half-open connections (SYN_RECV).
net.ipv4.tcp_max_syn_backlog = 8192
# ECN: negotiate per-connection; safe default on modern Internet paths.
net.ipv4.tcp_ecn = 2

# --- UDP / ICMP -------------------------------------------------------------
# UDP receive-memory pressure watermarks (pages).  Autotuned, but raise the
# minimum so bursty DNS / Steam / game-server lobby traffic doesn't drop.
net.ipv4.udp_rmem_min = 16384
net.ipv4.udp_wmem_min = 16384
# Ignore ICMP echoes to broadcasts (smurf mitigation) and bogus error replies.
net.ipv4.icmp_echo_ignore_broadcasts = 1
net.ipv4.icmp_ignore_bogus_error_responses = 1

# --- Routing / forwarding (workstation defaults) ---------------------------
# No IP forwarding -- this is a workstation, not a router.  Users who need
# it (libvirt, docker) should drop their own conf file in /etc/sysctl.d/.
net.ipv4.ip_forward = 0
net.ipv6.conf.all.forwarding = 0

# --- IPv6 -------------------------------------------------------------------
# Keep IPv6 on by default -- disabling breaks modern Internet (HE tunnel,
# AAAA-only services).  Suppress automatic RA acceptance on workstation
# class interfaces to prevent rogue-RA attacks; NM/systemd-networkd can
# re-enable per-interface as needed.  Most home users are on dual-stack and
# want the default kernel behaviour; set to 1 here rather than 0 to keep
# SLAAC working out of the box for laptops on consumer networks.
net.ipv6.conf.all.accept_ra = 1
net.ipv6.conf.default.accept_ra = 1
# Don't accept redirects from arbitrary peers (spoofing protection).
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0
