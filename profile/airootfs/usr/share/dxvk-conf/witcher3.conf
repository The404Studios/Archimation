# The Witcher 3: Wild Hunt -- DXVK overrides.
#
# The DX11 renderer in Witcher 3 hitches during shader compile on any card
# slower than a 1060.  We enable async (worker compile) + state cache so
# the first-run compile persists and the 2nd-run is stutter-free.
dxvk.enableAsync = True
dxvk.enableGraphicsPipelineLibrary = True

# Witcher 3 calls ID3D11DeviceContext::Flush() on every frame, which DXVK
# translates to vkQueueSubmit.  Force-commit on Flush drops that cost.
d3d11.relaxedBarriers = True

# The game maps a 2 GB buffer and memcpy's on every cut-scene — pin DXVK's
# staging allocation strategy to "copy at load" for smoother playback.
dxvk.maxChunkSize = 32
