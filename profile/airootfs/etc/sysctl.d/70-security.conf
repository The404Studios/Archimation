# AI Arch Linux -- kernel hardening.
#
# Defense-in-depth defaults that have NO measurable perf cost.  If the AI
# daemon or a local developer needs to soften one, they drop an override
# file with a higher numerical prefix (e.g. /etc/sysctl.d/90-dev.conf) --
# sysctl's last-wins rule makes that trivial.
#
# Sources: kernel-hardening-checklist, Arch Wiki Security, CIS Benchmarks.

# --- Kernel-info leak mitigations -------------------------------------------
# Hide kernel pointers from unprivileged readers (kallsyms, /proc/<pid>/stat).
kernel.kptr_restrict = 2
# Hide dmesg from non-root.  Many side-channel attacks start by reading
# dmesg for driver/device fingerprints.
kernel.dmesg_restrict = 1
# ptrace scope: 0=classic (any same-uid process), 1=only descendants, 2=admin
# only, 3=none.  Keep 0 for dev/debugger ergonomics -- GDB, strace, perf all
# need this.  Sysctl-tune.sh can tighten to 1 on NEW HW once validated.
kernel.yama.ptrace_scope = 0
# perf_event_paranoid: 2 blocks all perf from non-root by default.  Kept at
# 2 here; sysctl-tune.sh drops to 1 on NEW HW so developers can profile.
kernel.perf_event_paranoid = 2
# kexec_load: disable once boot is complete -- attacker with kexec can
# replace the running kernel without reboot.
kernel.kexec_load_disabled = 1
# Restrict unprivileged use of BPF.  DO NOT set unprivileged_bpf_disabled=0.
kernel.unprivileged_bpf_disabled = 1
# Enable JIT hardening so BPF programs harder to gadget.
net.core.bpf_jit_harden = 2
# Restrict the io_uring subsystem to privileged processes (Arch 6.1+).
# This closes the major kernel-heap-exploit surface of 2022-24.  Commented
# out because aiocache / DB workloads want it on NEW HW; sysctl-tune.sh
# toggles per-tier.
# kernel.io_uring_disabled = 2

# --- Spoofing / routing attacks --------------------------------------------
# Strict reverse-path filtering -- drops packets arriving on an interface
# where the reply would leave a different interface (classic spoof guard).
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1
# Don't accept source-routed packets (obsolete, attacker-controlled route).
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0
net.ipv6.conf.all.accept_source_route = 0
net.ipv6.conf.default.accept_source_route = 0
# Don't accept ICMP redirects (MITM vector); workstations don't need to be
# re-routed by gateways.
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.all.secure_redirects = 0
net.ipv4.conf.default.secure_redirects = 0
# Don't SEND redirects either (we're not a router).
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0
# Log Martian packets (impossible-source addresses).  Useful for debugging;
# rate-limited by the kernel so it won't flood journal.
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1
# ARP: ignore ARP queries for addresses on other interfaces (private-VLAN
# leakage protection).
net.ipv4.conf.all.arp_ignore = 1
net.ipv4.conf.all.arp_announce = 2

# --- TCP reset / spoof protection ------------------------------------------
net.ipv4.tcp_rfc1337 = 1    # drop RST in TIME_WAIT (mitigates RST attacks)

# --- Filesystem / mount -----------------------------------------------------
# Already set in 50-ai-arch-boot.conf:
#   fs.suid_dumpable=0, fs.protected_regular/fifos/hardlinks/symlinks.
# Nothing to add here; keeping the comment so future edits find the section.
