title   AI Arch Linux (x86_64, UEFI) - Safe Mode (nomodeset)  [use if default crashes]
linux   /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux
initrd  /%INSTALL_DIR%/boot/intel-ucode.img
initrd  /%INSTALL_DIR%/boot/amd-ucode.img
initrd  /%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
options archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% rootdelay=8 nomodeset cow_spacesize=30G amd_pstate=passive mitigations=auto nowatchdog loglevel=3 plymouth.enable=0 acpi=force nouveau.modeset=0 nvidia.modeset=0 radeon.modeset=0 amdgpu.modeset=0 i915.modeset=0
