# GTA V -- DXVK overrides.
#
# GTA V's D3D9 renderer has a thread-safety bug with map/unmap that
# DXVK's default path exposes as random crashes.  Serialize here.
d3d9.deferSurfaceCreation = True
d3d9.maxFrameLatency = 1

# GTA V reads gameconfig.xml for its own vsync; let the engine own vsync.
d3d9.presentInterval = -1
