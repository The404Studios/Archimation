#
# /etc/pacman.conf - AI Arch Linux runtime configuration
#

[options]
HoldPkg     = pacman glibc
Architecture = auto
CheckSpace
SigLevel    = Required DatabaseOptional
LocalFileSigLevel = Optional
ParallelDownloads = 5

Color
ILoveCandy
VerbosePkgLists

[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

[multilib]
Include = /etc/pacman.d/mirrorlist

# Custom repository (AI Arch Linux packages: pe-loader, trust-dkms,
# ai-control-daemon, windows-services, ai-desktop-config, ai-firewall, etc.)
#
# Two Server entries — pacman tries them in order, so:
#   1. On an INSTALLED system with network: HTTP mirror picks up fresh
#      packages published via `scripts/release-to-repo.sh`. This is how
#      `pacman -Syu` actually delivers bug fixes post-install.
#   2. On the LIVE ISO (or when the mirror is 404/offline): pacman falls
#      through to the file:// repo burned into the squashfs during bake.
#      Stale after release N+1 ships, but always safe.
#
# SigLevel = Optional TrustAll is pragmatic for now; production should add
# GPG signing via `makepkg --sign` + `repo-add --sign` — see
# docs/release-process.md for the signing rollout plan.
#
# IMPORTANT: the HTTPS URL below is a PLACEHOLDER. Operators must substitute
# their real release host before publishing. See docs/release-process.md.
[pe-compat]
SigLevel = Optional TrustAll
Server = https://example.invalid/pe-compat-repo/releases/download/latest/$arch
Server = file:///var/lib/pe-compat/repo
